<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 220" fill="none">
  <defs>
    <!-- Primary gradient: deep blue to indigo (light mode) -->
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0284c7"/>
      <stop offset="40%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>

    <!-- Accent gradient: teal to blue -->
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d9488"/>
      <stop offset="100%" stop-color="#0284c7"/>
    </linearGradient>

    <!-- Cascade gradient: blue progression -->
    <linearGradient id="g3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0284c7"/>
      <stop offset="50%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>

    <!-- Subtle glow for the logomark -->
    <filter id="softglow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6" result="blur"/>
      <feFlood flood-color="#0284c7" flood-opacity="0.1" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feComposite in="SourceGraphic" in2="shadow" operator="over"/>
    </filter>
  </defs>

  <!-- ===================== LOGOMARK ===================== -->
  <g transform="translate(58, 40)" filter="url(#softglow)">

    <!-- Hexagonal frame — thin, elegant -->
    <path d="M 80 6 L 140 38 L 140 102 L 80 134 L 20 102 L 20 38 Z"
          fill="none" stroke="url(#g1)" stroke-width="1.5" opacity="0.35"/>

    <!-- Inner hex subtle fill -->
    <path d="M 80 14 L 134 42 L 134 98 L 80 126 L 26 98 L 26 42 Z"
          fill="#0284c7" opacity="0.04"/>

    <!-- Horizontal ledge/shelf near the top (the dam edge) -->
    <line x1="40" y1="48" x2="120" y2="48"
          stroke="#0d9488" stroke-width="2" stroke-linecap="round" opacity="0.8"/>

    <!-- Source node at top of ledge (target/remote) -->
    <circle cx="80" cy="48" r="3" fill="#0d9488" opacity="0.8"/>

    <!-- Cascading curve 1: leftmost -->
    <path d="M 55 48 C 55 62, 48 68, 50 82 C 52 96, 58 102, 62 112"
          stroke="#0284c7" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.85"/>

    <!-- Cascading curve 2: center -->
    <path d="M 75 48 C 75 60, 72 72, 74 84 C 76 96, 78 104, 80 112"
          stroke="#2563eb" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.8"/>

    <!-- Cascading curve 3: rightmost -->
    <path d="M 95 48 C 95 58, 100 70, 98 82 C 96 94, 100 102, 98 112"
          stroke="#6366f1" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.75"/>

    <!-- Collection pool at bottom (subtle horizontal line) -->
    <line x1="44" y1="116" x2="116" y2="116"
          stroke="#a8a29e" stroke-width="1" stroke-linecap="round" opacity="0.3"/>

    <!-- Local mount node at bottom pool -->
    <circle cx="80" cy="116" r="5" fill="url(#g3)" opacity="0.9"/>
    <circle cx="80" cy="116" r="2.5" fill="#ffffff"/>

    <!-- Particle dots along cascading curves -->
    <circle cx="54" cy="60" r="1.5" fill="#0284c7" opacity="0.45"/>
    <circle cx="51" cy="75" r="1.2" fill="#0284c7" opacity="0.35"/>
    <circle cx="56" cy="95" r="1.5" fill="#0284c7" opacity="0.3"/>

    <circle cx="74" cy="58" r="1.2" fill="#2563eb" opacity="0.45"/>
    <circle cx="76" cy="78" r="1.5" fill="#2563eb" opacity="0.4"/>
    <circle cx="77" cy="98" r="1.2" fill="#2563eb" opacity="0.3"/>

    <circle cx="96" cy="56" r="1.5" fill="#6366f1" opacity="0.45"/>
    <circle cx="99" cy="74" r="1.2" fill="#6366f1" opacity="0.35"/>
    <circle cx="97" cy="96" r="1.5" fill="#6366f1" opacity="0.3"/>

    <!-- Small accent dots on ledge edges -->
    <circle cx="40" cy="48" r="1.5" fill="#0d9488" opacity="0.45"/>
    <circle cx="120" cy="48" r="1.5" fill="#0d9488" opacity="0.45"/>

    <!-- Corner accents on hex -->
    <circle cx="80" cy="6" r="2" fill="#06b6d4" opacity="0.25"/>
    <circle cx="80" cy="134" r="2" fill="#2563eb" opacity="0.25"/>
  </g>

  <!-- ===================== TYPOGRAPHY ===================== -->

  <!-- "SPILLWAY" — clean, bold, wide-tracked -->
  <text x="430" y="108"
        font-family="'SF Pro Display', 'Inter', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="82" font-weight="800" letter-spacing="18"
        fill="url(#g1)" text-anchor="middle">SPILLWAY</text>

  <!-- Thin separator line -->
  <line x1="270" y1="128" x2="590" y2="128"
        stroke="url(#g1)" stroke-width="0.8" opacity="0.2"/>

  <!-- Tagline — refined, subtle -->
  <text x="430" y="152"
        font-family="'SF Mono', 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace"
        font-size="11.5" font-weight="400" letter-spacing="5.5"
        fill="#57534e" text-anchor="middle">FUSE FILESYSTEM FOR OFFENSE</text>

  <!-- Descriptor — very subtle -->
  <text x="430" y="172"
        font-family="'SF Mono', 'JetBrains Mono', 'Fira Code', monospace"
        font-size="9" font-weight="400" letter-spacing="3"
        fill="#a8a29e" text-anchor="middle">GO  ·  TLS 1.3  ·  FUSE  ·  PSK</text>
</svg>
