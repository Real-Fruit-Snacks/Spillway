<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 220" fill="none">
  <defs>
    <!-- Primary gradient: sapphire to lavender (Networking category) -->
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#74c7ec"/>
      <stop offset="40%" stop-color="#89b4fa"/>
      <stop offset="100%" stop-color="#b4befe"/>
    </linearGradient>

    <!-- Accent gradient: teal to sapphire -->
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#94e2d5"/>
      <stop offset="100%" stop-color="#74c7ec"/>
    </linearGradient>

    <!-- Cascade gradient: sapphire to blue to lavender -->
    <linearGradient id="g3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#74c7ec"/>
      <stop offset="50%" stop-color="#89b4fa"/>
      <stop offset="100%" stop-color="#b4befe"/>
    </linearGradient>

    <!-- Subtle glow for the logomark -->
    <filter id="softglow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6" result="blur"/>
      <feFlood flood-color="#74c7ec" flood-opacity="0.15" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feComposite in="SourceGraphic" in2="shadow" operator="over"/>
    </filter>
  </defs>

  <!-- ===================== LOGOMARK ===================== -->
  <g transform="translate(58, 40)" filter="url(#softglow)">

    <!-- Hexagonal frame — thin, elegant -->
    <path d="M 80 6 L 140 38 L 140 102 L 80 134 L 20 102 L 20 38 Z"
          fill="none" stroke="url(#g1)" stroke-width="1.5" opacity="0.4"/>

    <!-- Inner hex subtle fill -->
    <path d="M 80 14 L 134 42 L 134 98 L 80 126 L 26 98 L 26 42 Z"
          fill="#74c7ec" opacity="0.04"/>

    <!-- Horizontal ledge/shelf near the top (the dam edge) -->
    <line x1="40" y1="48" x2="120" y2="48"
          stroke="#94e2d5" stroke-width="2" stroke-linecap="round" opacity="0.85"/>

    <!-- Source node at top of ledge (target/remote) -->
    <circle cx="80" cy="48" r="3" fill="#94e2d5" opacity="0.8"/>

    <!-- Cascading curve 1: leftmost, sapphire -->
    <path d="M 55 48 C 55 62, 48 68, 50 82 C 52 96, 58 102, 62 112"
          stroke="#74c7ec" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.9"/>

    <!-- Cascading curve 2: center, blue -->
    <path d="M 75 48 C 75 60, 72 72, 74 84 C 76 96, 78 104, 80 112"
          stroke="#89b4fa" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.85"/>

    <!-- Cascading curve 3: rightmost, lavender -->
    <path d="M 95 48 C 95 58, 100 70, 98 82 C 96 94, 100 102, 98 112"
          stroke="#b4befe" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.8"/>

    <!-- Collection pool at bottom (subtle horizontal line) -->
    <line x1="44" y1="116" x2="116" y2="116"
          stroke="#7f849c" stroke-width="1" stroke-linecap="round" opacity="0.35"/>

    <!-- Local mount node at bottom pool -->
    <circle cx="80" cy="116" r="5" fill="url(#g3)" opacity="0.9"/>
    <circle cx="80" cy="116" r="2.5" fill="#1e1e2e"/>

    <!-- Particle dots along cascading curves -->
    <circle cx="54" cy="60" r="1.5" fill="#74c7ec" opacity="0.5"/>
    <circle cx="51" cy="75" r="1.2" fill="#74c7ec" opacity="0.4"/>
    <circle cx="56" cy="95" r="1.5" fill="#74c7ec" opacity="0.35"/>

    <circle cx="74" cy="58" r="1.2" fill="#89b4fa" opacity="0.5"/>
    <circle cx="76" cy="78" r="1.5" fill="#89b4fa" opacity="0.45"/>
    <circle cx="77" cy="98" r="1.2" fill="#89b4fa" opacity="0.35"/>

    <circle cx="96" cy="56" r="1.5" fill="#b4befe" opacity="0.5"/>
    <circle cx="99" cy="74" r="1.2" fill="#b4befe" opacity="0.4"/>
    <circle cx="97" cy="96" r="1.5" fill="#b4befe" opacity="0.35"/>

    <!-- Small accent dots on ledge edges -->
    <circle cx="40" cy="48" r="1.5" fill="#94e2d5" opacity="0.5"/>
    <circle cx="120" cy="48" r="1.5" fill="#94e2d5" opacity="0.5"/>

    <!-- Corner accents on hex -->
    <circle cx="80" cy="6" r="2" fill="#89dceb" opacity="0.3"/>
    <circle cx="80" cy="134" r="2" fill="#89b4fa" opacity="0.3"/>
  </g>

  <!-- ===================== TYPOGRAPHY ===================== -->

  <!-- "SPILLWAY" — clean, bold, wide-tracked -->
  <text x="430" y="108"
        font-family="'SF Pro Display', 'Inter', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="82" font-weight="800" letter-spacing="18"
        fill="url(#g1)" text-anchor="middle">SPILLWAY</text>

  <!-- Thin separator line -->
  <line x1="270" y1="128" x2="590" y2="128"
        stroke="url(#g1)" stroke-width="0.8" opacity="0.25"/>

  <!-- Tagline — refined, subtle -->
  <text x="430" y="152"
        font-family="'SF Mono', 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace"
        font-size="11.5" font-weight="400" letter-spacing="5.5"
        fill="#7f849c" text-anchor="middle">FUSE FILESYSTEM FOR OFFENSE</text>

  <!-- Descriptor — very subtle -->
  <text x="430" y="172"
        font-family="'SF Mono', 'JetBrains Mono', 'Fira Code', monospace"
        font-size="9" font-weight="400" letter-spacing="3"
        fill="#585b70" text-anchor="middle">GO  ·  TLS 1.3  ·  FUSE  ·  PSK</text>
</svg>
