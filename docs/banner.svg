<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#11111b"/>
      <stop offset="50%" stop-color="#1e1e2e"/>
      <stop offset="100%" stop-color="#181825"/>
    </linearGradient>
    <linearGradient id="title-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#74c7ec"/>
      <stop offset="50%" stop-color="#89b4fa"/>
      <stop offset="100%" stop-color="#b4befe"/>
    </linearGradient>
    <linearGradient id="accent-line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#74c7ec" stop-opacity="0"/>
      <stop offset="20%" stop-color="#74c7ec"/>
      <stop offset="50%" stop-color="#89b4fa"/>
      <stop offset="80%" stop-color="#b4befe"/>
      <stop offset="100%" stop-color="#b4befe" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>
  <!-- Title -->
  <text x="640" y="290" font-family="Segoe UI, Arial, sans-serif" font-size="96" font-weight="800" fill="url(#title-grad)" text-anchor="middle" letter-spacing="8" filter="url(#glow)">SPILLWAY</text>

  <!-- Accent line -->
  <rect x="340" y="318" width="600" height="2" rx="1" fill="url(#accent-line)"/>

  <!-- Tagline -->
  <text x="640" y="370" font-family="Consolas, Courier New, monospace" font-size="20" fill="#a6adc8" text-anchor="middle" letter-spacing="6">FUSE FILESYSTEM FOR OFFENSE</text>

  <!-- Descriptor -->
  <text x="640" y="410" font-family="Consolas, Courier New, monospace" font-size="14" fill="#585b70" text-anchor="middle" letter-spacing="4">GO  ·  TLS 1.3  ·  FUSE  ·  PSK</text>
</svg>
